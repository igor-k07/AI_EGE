<div
  class="w-full h-full flex flex-col items-center justify-center text-center p-8"
>
  <div
    class="w-full max-w-4xl bg-slate-800/50 border border-slate-700 rounded-3xl p-10 shadow-2xl"
  >
    <i
      class="fa-solid fa-rocket text-5xl text-blue-500 bg-slate-700 p-6 rounded-full"
    ></i>
    <h1 class="text-4xl font-black mt-6">Добро пожаловать в AI.EGE!</h1>
    <p class="text-slate-400 mt-2 max-w-2xl mx-auto">
      Прежде чем мы начнем, давайте настроим ваш персональный план подготовки.
      Это займет всего пару минут.
    </p>

    <div class="space-y-10 mt-12 text-left">
      <!-- Step 1: Subject Selection -->
      <div>
        <h2 class="text-xl font-bold">
          <span
            class="bg-blue-600 text-white rounded-full w-8 h-8 inline-flex items-center justify-center mr-3"
            >1</span
          >
          Выберите предметы для подготовки
        </h2>
        <div
          class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4"
          id="subject-selection"
        >
          <!-- Subjects will be injected here by JS -->
        </div>
      </div>

      <!-- Step 2: Target Score -->
      <div>
        <h2 class="text-xl font-bold">
          <span
            class="bg-blue-600 text-white rounded-full w-8 h-8 inline-flex items-center justify-center mr-3"
            >2</span
          >
          Укажите желаемый балл
        </h2>
        <div class="mt-6 bg-slate-900 p-6 rounded-2xl">
          <div class="flex justify-between items-center font-bold text-lg">
            <span>Начальный</span>
            <span id="target-score-value" class="text-blue-400 text-3xl"
              >80+</span
            >
            <span>Высокий</span>
          </div>
          <input
            id="score-slider"
            type="range"
            min="40"
            max="100"
            value="80"
            class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer mt-4"
          />
        </div>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="mt-12">
      <button
        class="w-full max-w-md bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-5 rounded-2xl text-lg font-black flex items-center justify-center gap-3 transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-600/30"
      >
        <i class="fa-solid fa-play"></i> Начать калибровку знаний
      </button>
      <p class="text-xs text-slate-500 mt-3">
        Вам будет предложен небольшой тест для оценки вашего текущего уровня.
      </p>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // --- Subject Selection Logic ---
    const subjects = [
      { id: "math", name: "Математика", icon: "fa-infinity" },
      { id: "russian", name: "Русский язык", icon: "fa-pen-nib" },
      { id: "cs", name: "Информатика", icon: "fa-laptop-code" },
      { id: "physics", name: "Физика", icon: "fa-atom" },
    ];

    const selectionContainer = document.getElementById("subject-selection");
    subjects.forEach((subject) => {
      const card = document.createElement("div");
      card.className =
        "subject-card bg-slate-900 p-4 rounded-2xl border-2 border-transparent cursor-pointer transition-all flex flex-col items-center justify-center gap-3 aspect-square";
      card.dataset.subjectId = subject.id;
      card.innerHTML = `
        <i class="fa-solid ${subject.icon} text-3xl text-slate-400"></i>
        <b class="text-sm text-center">${subject.name}</b>
      `;
      card.addEventListener("click", () => {
        card.classList.toggle("selected");
        card.classList.toggle("border-blue-500");
      });
      selectionContainer.appendChild(card);
    });

    // --- Score Slider Logic ---
    const slider = document.getElementById("score-slider");
    const scoreValue = document.getElementById("target-score-value");

    slider.addEventListener("input", (event) => {
      const value = event.target.value;
      scoreValue.textContent = `${value}+`;
    });
  });
</script>

<style>
  .subject-card.selected {
    background-color: rgba(59, 130, 246, 0.1);
  }
  .subject-card.selected i,
  .subject-card.selected b {
    color: #3b82f6;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    background: #3b82f6;
    cursor: pointer;
    border-radius: 50%;
    border: 4px solid #0f172a;
    transition: transform 0.2s;
  }
  input[type="range"]:active::-webkit-slider-thumb {
    transform: scale(1.2);
  }
</style>
