<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Настройка предмета — AI.EGE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans:wght@400;700&display=swap&subset=cyrillic"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #0b1117;
        --text: #c9d1d9;
        --muted: #8b949e;
        --primary: #6f42c1;
        --border: #21262d;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Noto Sans", Inter, system-ui;
        padding: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 100%;
        max-width: 720px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(0, 0, 0, 0.02)
        );
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 6px 24px rgba(11, 17, 23, 0.6);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          background-color 0.12s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      }
      .btn-primary {
        background: linear-gradient(90deg, var(--primary), #5b21b6);
        color: white;
        border: none;
        box-shadow: 0 8px 24px rgba(111, 66, 193, 0.18);
      }
      #subject-icon i {
        font-size: 28px;
      }
      select,
      input[type="range"] {
        outline: none;
      }
      .note {
        background: rgba(255, 255, 255, 0.015);
        padding: 12px;
        border-radius: 10px;
        color: var(--muted);
        margin-top: 12px;
      }
      .note {
        background: rgba(255, 255, 255, 0.02);
        padding: 12px;
        border-radius: 10px;
        color: var(--muted);
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div
        id="header"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <h2 id="title" style="margin: 0; font-size: 20px; font-weight: 800">
          Настройка предмета
        </h2>
        <div style="color: var(--muted)" id="progress">1/1</div>
      </div>

      <div style="margin-top: 14px">
        <div
          id="subject-head"
          style="
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 8px 0;
          "
        >
          <div
            id="subject-icon"
            style="
              width: 64px;
              height: 64px;
              border-radius: 12px;
              display: flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.02),
                rgba(255, 255, 255, 0.01)
              );
              border: 1px solid var(--border);
              font-size: 26px;
              color: var(--primary);
            "
          ></div>
          <div>
            <h3
              id="subject-name"
              style="margin: 0; font-size: 20px; font-weight: 800"
            ></h3>
            <div
              id="subject-sub"
              style="color: var(--muted); font-size: 13px; margin-top: 4px"
            >
              Настройте целевой балл и режим пробника
            </div>
          </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center">
          <div style="flex: 1">
            <label style="font-weight: 700; display: block; margin-bottom: 6px"
              >Целевой балл</label
            >
            <input
              id="score-slider"
              type="range"
              min="40"
              max="100"
              value="80"
              style="width: 100%; accent-color: var(--primary)"
            />
            <div
              style="margin-top: 8px; font-weight: 700; color: var(--primary)"
              id="score-val"
            >
              80+
            </div>
          </div>
        </div>

        <div style="margin-top: 14px">
          <label style="font-weight: 700; display: block; margin-bottom: 6px"
            >Режим пробника</label
          >
          <select
            id="mode"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 10px;
              background: transparent;
              border: 1px solid var(--border);
              color: var(--text);
            "
          >
            <option value="none">Не решать пробник</option>
            <option value="auto">Решать пробник автоматически</option>
            <option value="explain">Только разбор задач</option>
          </select>
          <div class="note">
            Если вы выберете «Не решать пробник», оценка начального уровня будет
            менее точной.
          </div>
        </div>

        <div
          style="
            margin-top: 18px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
          "
        >
          <button id="back" class="btn">Назад</button>
          <button id="save" class="btn btn-primary">Сохранить и далее</button>
        </div>
      </div>
    </div>

    <script>
      const SUBJECTS_MAP = {
        math_profile: "Математика (профиль)",
        math_basic: "Математика (базовый)",
        russian: "Русский язык",
        informatics: "Информатика",
        physics: "Физика",
        chemistry: "Химия",
        biology: "Биология",
        history: "История",
        society: "Обществознание",
        english: "Английский",
      };

      const SUBJECT_ICONS = {
        math_profile: "fa-solid fa-square-root-variable",
        math_basic: "fa-solid fa-calculator",
        russian: "fa-solid fa-book-open",
        informatics: "fa-solid fa-laptop-code",
        physics: "fa-solid fa-atom",
        chemistry: "fa-solid fa-vials",
        biology: "fa-solid fa-dna",
        history: "fa-solid fa-landmark",
        society: "fa-solid fa-users",
        english: "fa-solid fa-language",
      };

      function qs(name) {
        const u = new URL(window.location.href);
        return u.searchParams.get(name);
      }
      function getQueue() {
        try {
          return JSON.parse(localStorage.getItem("welcomeQueue") || "[]");
        } catch (e) {
          return [];
        }
      }
      function setQueue(q) {
        try {
          localStorage.setItem("welcomeQueue", JSON.stringify(q));
        } catch (e) {}
      }

      const id = qs("id");
      const queue = getQueue();
      const idx = queue.indexOf(id);
      const progressEl = document.getElementById("progress");
      progressEl.textContent = idx >= 0 ? idx + 1 + "/" + queue.length : "1/1";

      document.getElementById("subject-name").textContent =
        SUBJECTS_MAP[id] || id;
      // set icon
      const iconCls = SUBJECT_ICONS[id];
      const iconEl = document.getElementById("subject-icon");
      if (iconCls && iconEl) {
        iconEl.innerHTML = `<i class="${iconCls}" aria-hidden="true"></i>`;
      } else if (iconEl) {
        iconEl.textContent = SUBJECTS_MAP[id] ? SUBJECTS_MAP[id][0] : id[0];
      }
      const slider = document.getElementById("score-slider");
      const scoreVal = document.getElementById("score-val");
      slider.addEventListener(
        "input",
        (e) => (scoreVal.textContent = e.target.value + "+"),
      );

      // restore if exists
      try {
        const cfgs = JSON.parse(
          localStorage.getItem("initialSubjectConfigs") || "{}",
        );
        if (cfgs[id]) {
          slider.value = cfgs[id].score;
          scoreVal.textContent = cfgs[id].score + "+";
          document.getElementById("mode").value = cfgs[id].mode;
        }
      } catch (e) {}

      document.getElementById("back").addEventListener("click", () => {
        window.location.href = "subjects.html";
      });
      document.getElementById("save").addEventListener("click", () => {
        const score = slider.value;
        const mode = document.getElementById("mode").value;
        try {
          const cfgs = JSON.parse(
            localStorage.getItem("initialSubjectConfigs") || "{}",
          );
          cfgs[id] = { score: score, mode: mode };
          localStorage.setItem("initialSubjectConfigs", JSON.stringify(cfgs));
        } catch (e) {}
        // move queue
        const q = getQueue();
        const curIndex = q.indexOf(id);
        if (curIndex >= 0) q.splice(curIndex, 1);
        setQueue(q);
        if (q.length > 0) {
          // go to next subject
          window.location.href = `subject-config.html?id=${encodeURIComponent(q[0])}`;
          return;
        }
        // finished all: mark completed and go to main
        try {
          localStorage.setItem("welcomeCompleted", "1");
        } catch (e) {}
        try {
          if (
            window.parent &&
            window.parent !== window &&
            typeof window.parent.showPage === "function"
          ) {
            window.parent.showPage("home");
            return;
          }
        } catch (e) {}
        window.location.href = "../main.html";
      });
    </script>
  </body>
</html>
